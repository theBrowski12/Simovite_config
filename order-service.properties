spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/order_db?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# le service url
spring.cloud.openfeign.circuitbreaker.enabled=true

# Circuit Breaker config
resilience4j.circuitbreaker.instances.catalog-service.sliding-window-size=5
resilience4j.circuitbreaker.instances.catalog-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.catalog-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.catalog-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.timelimiter.instances.PriceFeignClientcalculatePricePriceRequestDto.timeout-duration=4s
#enregistrer avec adresse IP.

# Kafka Configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
# Producer Configuration
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# JSON Serialization
spring.kafka.producer.properties.spring.json.add.type.headers=false
# Autoriser la dťsťrialisation de tous les packages (trŤs utile en microservices)
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Disable Kafka logs
logging.level.org.apache.kafka=ERROR
logging.level.org.springframework.kafka=ERROR
logging.level.kafka=ERROR

# Disable Feign interceptor logs
logging.level.cf.order_service.config.FeignJwtInterceptor=ERROR
logging.level.feign=ERROR

# Keep your app logs
logging.level.cf.order_service=INFO

management.endpoint.prometheus.enabled=true

