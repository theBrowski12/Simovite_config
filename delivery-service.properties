spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/delivery_db?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#Activer l'enregistrement

# ===============================
# Kafka Configuration
# ===============================
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Producer Configuration
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Consumer Configuration
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# 1?? On utilise le ErrorHandlingDeserializer pour Õviter les crashs en boucle
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

# 2?? On dit au ErrorHandler de dÕlÕguer la vraie lecture au JsonDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# 3?? Autoriser la dÕsÕrialisation de tous les packages
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# 4?? LA LIGNE MAGIQUE : on force la conversion vers TA classe OrderPaidEvent
spring.kafka.consumer.properties.spring.json.value.default.type=cf.delivery_service.kafkaEvents.OrderPaidEvent

# 5?? On dit Á Kafka d'ignorer les en-tõtes de type envoyÕs par l'Order_Service
spring.kafka.consumer.properties.spring.json.use.type.headers=false

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
# Disable Kafka logs
logging.level.org.apache.kafka=ERROR
logging.level.org.springframework.kafka=ERROR
logging.level.kafka=ERROR

# Disable Feign interceptor logs
logging.level.cf.order_service.config.FeignJwtInterceptor=ERROR
logging.level.feign=ERROR

# Keep your app logs
logging.level.cf.order_service=INFO
