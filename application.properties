spring.cloud.compatibility-verifier.enabled=false

#Activer l'enregistrement
spring.cloud.discovery.enabled=true
# le service url

eureka.client.service-url.defaultZone=${DISCOVERY_SERVICE_URL:http://localhost:8761/eureka}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/Simovite}
#enregistrer avec adresse IP.
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

management.endpoints.web.exposure.include=*

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_CERTS:http://localhost:8080/realms/Simovite/protocol/openid-connect/certs}

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

management.endpoint.prometheus.enabled=true

# Enable percentile histograms for HTTP requests
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Optional: Define specific percentiles
management.metrics.distribution.percentiles.http.server.requests=0.5,0.9,0.95,0.99

# Optional: Define SLA boundaries (in milliseconds)
management.metrics.distribution.slo.http.server.requests=10ms,50ms,100ms,200ms,500ms,1s,2s

